<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AppHub</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0d0f14;
      --surface:   #13161e;
      --card:      #1a1e29;
      --border:    #252a38;
      --accent:    #5b6eff;
      --accent2:   #00d4aa;
      --text:      #e8ecf5;
      --muted:     #7a8099;
      --radius:    14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,15,20,.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px; gap: 10px;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.15rem;
      color: var(--text); text-decoration: none;
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .logo span { color: var(--accent); }
    .search-wrap { flex: 1; position: relative; }
    .search-wrap svg {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; color: var(--muted); pointer-events: none;
    }
    #searchInput {
      width: 100%;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: 'Manrope', sans-serif;
      font-size: .82rem; padding: .45rem .75rem .45rem 30px;
      border-radius: 999px; outline: none; transition: border-color .2s;
    }
    #searchInput::placeholder { color: var(--muted); }
    #searchInput:focus { border-color: var(--accent); }

    .hero {
      text-align: center;
      padding: 28px 16px 20px;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: -40% -20%;
      background: radial-gradient(ellipse 70% 60% at 50% 30%, rgba(91,110,255,.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(91,110,255,.12); border: 1px solid rgba(91,110,255,.3);
      color: #a0aaff; font-size: .72rem; font-weight: 600;
      padding: .25rem .85rem; border-radius: 999px; letter-spacing: .04em;
      margin-bottom: 12px; text-transform: uppercase;
    }
    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.7rem; font-weight: 800; line-height: 1.15;
      letter-spacing: -.02em; margin-bottom: 8px;
    }
    .hero h1 em {
      font-style: normal;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero p { color: var(--muted); font-size: .88rem; }

    .filter-wrap {
      position: sticky; top: 56px; z-index: 90;
      background: rgba(13,15,20,.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 8px 0;
    }
    .filter-bar {
      display: flex; gap: 6px; padding: 0 16px;
      overflow-x: auto; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-family: 'Manrope', sans-serif;
      font-size: .75rem; font-weight: 600; padding: .35rem 1rem;
      border-radius: 999px; cursor: pointer; transition: all .2s;
      white-space: nowrap; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    main { padding: 16px 16px 32px; }

    .section { margin-bottom: 24px; }
    .section.hidden { display: none; }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: .85rem;
      letter-spacing: .06em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 12px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::before {
      content: ''; display: block; width: 4px; height: 16px; border-radius: 2px;
      background: linear-gradient(180deg, var(--accent), var(--accent2)); flex-shrink: 0;
    }

    .grid { display: flex; flex-direction: column; gap: 10px; }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px;
      display: flex; flex-direction: column; gap: 10px;
      position: relative; overflow: hidden; transition: border-color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active { border-color: rgba(91,110,255,.4); }

    .card-head { display: flex; align-items: center; gap: 12px; }
    .app-icon {
      width: 46px; height: 46px; border-radius: 10px;
      object-fit: contain; background: var(--surface); flex-shrink: 0;
    }
    .app-icon-fallback {
      width: 46px; height: 46px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .app-name {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: .95rem; line-height: 1.2;
    }
    .card-desc { color: var(--muted); font-size: .82rem; line-height: 1.55; }

    .warn-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,160,30,.1); border: 1px solid rgba(255,160,30,.35);
      color: #ffb347; font-size: .72rem; font-weight: 700;
      padding: .25rem .65rem; border-radius: 6px;
    }
    .warn-badge svg { width: 12px; height: 12px; flex-shrink: 0; }

    .dl-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: transparent; border: 1px solid var(--border); color: var(--accent);
      font-family: 'Manrope', sans-serif; font-weight: 700; font-size: .8rem;
      padding: .55rem 1rem; border-radius: 8px; text-decoration: none; cursor: pointer;
      transition: all .2s; align-self: flex-start;
      -webkit-tap-highlight-color: transparent;
    }
    .dl-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    .dl-btn:active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .no-results { display: none; text-align: center; padding: 48px 16px; color: var(--muted); }
    .no-results.visible { display: block; }
    .no-results h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; margin-bottom: 6px; }

    footer {
      border-top: 1px solid var(--border);
      text-align: center; color: var(--muted);
      font-size: .78rem; padding: 20px 16px 32px;
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="#">App<span>Hub</span></a>

<footer>Все программы загружаются из официальных источников · AppHub</footer>

      { name: "AMD Software Adrenalin", icon: "https://gniloe-kapito.github.io/progs/ico/amd_software_adrenalin.webp", desc: "Официальная панель управления видеокартами AMD с драйверами, Radeon ReLive и настройкой производительности.", link: "https://www.amd.com/en/support/download/drivers.html", label: "На сайт" },
    ]
  },
];

const ICON_DL = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
const ICON_EXT = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;
const ICON_WARN = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;

function openLink(url) {
  if (window.Telegram && window.Telegram.WebApp) {
    window.Telegram.WebApp.openLink(url);
  } else {
    window.open(url, '_blank');
  }
}

function buildUI() {
  const filterBar = document.getElementById('filterBar');
  const main = document.getElementById('mainContent');

  APPS_DATA.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.cat = cat.id;
    btn.textContent = cat.name;
    filterBar.appendChild(btn);
  });

  APPS_DATA.forEach(cat => {
    const section = document.createElement('section');
    section.className = 'section';
    section.dataset.cat = cat.id;

    const title = document.createElement('h2');
    title.className = 'section-title';
    title.textContent = cat.name;
    section.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'grid';

    cat.apps.forEach(app => {
      const card = document.createElement('div');
      card.className = 'card';

      const iconHTML = app.icon
        ? `<img class="app-icon" src="${app.icon}" alt="${app.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="app-icon-fallback" style="display:none">${app.name[0]}</div>`
        : `<div class="app-icon-fallback">${app.name[0]}</div>`;

      const warnHTML = app.warn ? `<span class="warn-badge">${ICON_WARN}${app.warn}</span>` : '';
      const btnIcon = app.label === 'Скачать' ? ICON_DL : ICON_EXT;

      card.innerHTML = `
        <div class="card-head">${iconHTML}<span class="app-name">${app.name}</span></div>
        <p class="card-desc">${app.desc}</p>
        ${warnHTML}
        <a class="dl-btn" href="${app.link}" target="_blank" rel="noopener">${btnIcon} ${app.label}</a>
      `;

      card.querySelector('.dl-btn').addEventListener('click', function(e) {
        if (window.Telegram && window.Telegram.WebApp) {
          e.preventDefault();
          openLink(app.link);
        }
      });

      grid.appendChild(card);
    });

    section.appendChild(grid);
    main.appendChild(section);
  });

  filterBar.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cat = btn.dataset.cat;
    document.querySelectorAll('.section').forEach(sec => {
      sec.classList.toggle('hidden', cat !== 'all' && sec.dataset.cat !== cat);
    });
    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    document.getElementById('searchInput').value = '';
    document.getElementById('noResults').classList.remove('visible');
  });

  document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    filterBar.querySelector('[data-cat="all"]').classList.add('active');
    let totalVisible = 0;
    document.querySelectorAll('.section').forEach(sec => {
      sec.classList.remove('hidden');
      let visCount = 0;
      const cat = APPS_DATA.find(c => c.id === sec.dataset.cat);
      sec.querySelectorAll('.card').forEach((card, i) => {
        const app = cat ? cat.apps[i] : null;
        if (!app) return;
        const match = !q || app.name.toLowerCase().includes(q) || app.desc.toLowerCase().includes(q);
        card.style.display = match ? '' : 'none';
        if (match) visCount++;
      });
      if (visCount === 0) sec.classList.add('hidden');
      totalVisible += visCount;
    });
    document.getElementById('noResults').classList.toggle('visible', totalVisible === 0 && q.length > 0);
  });
}

buildUI();
</script>
</body>
</html>
